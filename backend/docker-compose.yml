version: '3.8'

services:
  # Container 1: PostgreSQL Database Instance
  database:
    image: postgres:15-alpine
    container_name: lakewood_dental_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secure_pass_2026
      POSTGRES_DB: lakewood_dental
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount the schema.sql script to initialize the database structure automatically on first start
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - dental_network

  # Container 2: pgAdmin 4 (Visual Tabular DB Management Interface)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lakewood_dental_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lakewoodfamilydental.com
      PGADMIN_DEFAULT_PASSWORD: admin_password_2026
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - database
    networks:
      - dental_network

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  dental_network:
    driver: bridge
